<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coração em RA</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f2f2f2;
    }

    h2 {
      margin: 16px 10px 8px;
    }

    p {
      margin: 8px 10px 16px;
    }

    model-viewer {
      width: 100vw;
      height: 80vh;
      background: #ffffff;
    }
  </style>
</head>
<body>

  <h2>Coração Humano em Realidade Aumentada</h2>

  <model-viewer
    src="coracao1.glb"
    alt="Modelo 3D de um coração humano"
    camera-controls
    auto-rotate
    autoplay
    ar
    ar-modes="webxr scene-viewer quick-look"
    shadow-intensity="1">
  </model-viewer>

  <p>Toque no botão de RA para visualizar o coração no ambiente.</p>

</body>
</html>
